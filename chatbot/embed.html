<div id="solvire-chat-widget">
  <button id="solvire-fab">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
  </button>
  <div id="solvire-chat-window">
    <div id="solvire-chat-header">
      <div class="solvire-header-info">
        <div class="solvire-avatar">S</div>
        <div>
          <h3 class="solvire-title">Solvire AI</h3>
          <p class="solvire-subtitle">Customer Support</p>
        </div>
      </div>
      <button id="solvire-close">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div id="solvire-chat-messages"></div>
    <div id="solvire-chat-input-area">
      <input type="text" id="solvire-chat-input" placeholder="Type your message..." autocomplete="off">
      <button id="solvire-chat-send">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<style>
#solvire-chat-widget {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 999999;
  font-family: system-ui, -apple-system, sans-serif;
  color: #1a202c;
}
#solvire-fab {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #0f172a;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 24px rgba(15, 23, 42, 0.4);
  cursor: pointer;
  border: none;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
#solvire-fab:hover {
  transform: scale(1.05);
}
#solvire-fab svg {
  width: 28px;
  height: 28px;
  fill: currentColor;
}
#solvire-chat-window {
  position: absolute;
  bottom: 80px;
  right: 0;
  width: 380px;
  height: 600px;
  max-height: calc(100vh - 120px);
  max-width: calc(100vw - 48px);
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 24px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255,255,255,0.2) inset;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform-origin: bottom right;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  opacity: 0;
  transform: scale(0.8) translateY(20px);
  pointer-events: none;
}
#solvire-chat-window.open {
  opacity: 1;
  transform: scale(1) translateY(0);
  pointer-events: all;
}
#solvire-chat-header {
  background: rgba(15, 23, 42, 0.9);
  backdrop-filter: blur(8px);
  color: white;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.solvire-header-info {
  display: flex;
  align-items: center;
  gap: 12px;
}
.solvire-avatar {
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}
.solvire-title {
  margin: 0;
  font-size: 16px;
  font-weight: 600;
}
.solvire-subtitle {
  margin: 2px 0 0 0;
  font-size: 12px;
  opacity: 0.7;
}
#solvire-close {
  background: transparent;
  border: none;
  color: white;
  cursor: pointer;
  opacity: 0.7;
  transition: opacity 0.2s;
}
#solvire-close:hover { opacity: 1; }
#solvire-close svg { width: 20px; height: 20px; fill: currentColor; }
#solvire-chat-messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
#solvire-chat-messages::-webkit-scrollbar {
  width: 6px;
}
#solvire-chat-messages::-webkit-scrollbar-thumb {
  background: rgba(15, 23, 42, 0.2);
  border-radius: 10px;
}
.solvire-msg-wrapper {
  display: flex;
  flex-direction: column;
  max-width: 85%;
}
.solvire-msg-wrapper.user {
  align-self: flex-end;
  align-items: flex-end;
}
.solvire-msg-wrapper.ai {
  align-self: flex-start;
  align-items: flex-start;
}
.solvire-msg {
  padding: 12px 16px;
  font-size: 14px;
  line-height: 1.5;
  border-radius: 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.solvire-msg-wrapper.user .solvire-msg {
  background: #0f172a;
  color: #fff;
  border-bottom-right-radius: 4px;
}
.solvire-msg-wrapper.ai .solvire-msg {
  background: rgba(255, 255, 255, 0.9);
  color: #0f172a;
  border-bottom-left-radius: 4px;
  border: 1px solid rgba(0,0,0,0.05);
}
.solvire-typing {
  display: flex;
  gap: 4px;
  padding: 8px 4px;
}
.solvire-dot {
  width: 6px;
  height: 6px;
  background: #94a3b8;
  border-radius: 50%;
  animation: solvireBounce 1.4s infinite ease-in-out both;
}
.solvire-dot:nth-child(1) { animation-delay: -0.32s; }
.solvire-dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes solvireBounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}
#solvire-chat-input-area {
  padding: 16px;
  background: rgba(255, 255, 255, 0.5);
  border-top: 1px solid rgba(255,255,255,0.3);
  display: flex;
  gap: 12px;
}
#solvire-chat-input {
  flex: 1;
  background: rgba(255,255,255,0.8);
  border: 1px solid rgba(15, 23, 42, 0.1);
  border-radius: 24px;
  padding: 12px 16px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
  transition: all 0.2s;
}
#solvire-chat-input:focus {
  background: #fff;
  border-color: #0f172a;
  box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1);
}
#solvire-chat-send {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: #0f172a;
  color: white;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
  flex-shrink: 0;
}
#solvire-chat-send:hover {
  background: #1e293b;
  transform: scale(1.05);
}
#solvire-chat-send svg {
  width: 20px;
  height: 20px;
  fill: currentColor;
  margin-left: 2px;
}
@media (max-width: 600px) {
  #solvire-chat-window {
    width: calc(100vw - 32px);
    height: calc(100vh - 120px);
    right: 16px;
    bottom: 80px;
  }
}
</style>

<script>
(function() {
  const BACKEND_URL = '/api/chat';
  
  const fab = document.getElementById('solvire-fab');
  const chatWindow = document.getElementById('solvire-chat-window');
  const closeBtn = document.getElementById('solvire-close');
  const messagesArea = document.getElementById('solvire-chat-messages');
  const inputField = document.getElementById('solvire-chat-input');
  const sendBtn = document.getElementById('solvire-chat-send');

  let isOpen = false;
  let isTyping = false;
  let messages = [
    { role: 'assistant', content: 'Hello! I am Solvire AI. How can I assist you today?' }
  ];

  function toggleChat() {
    isOpen = !isOpen;
    if (isOpen) {
      chatWindow.classList.add('open');
      fab.style.transform = 'scale(0)';
      fab.style.opacity = '0';
      setTimeout(() => inputField.focus(), 300);
    } else {
      chatWindow.classList.remove('open');
      fab.style.transform = 'scale(1)';
      fab.style.opacity = '1';
    }
  }

  function renderMessages() {
    messagesArea.innerHTML = '';
    messages.forEach(msg => {
      if (msg.role === 'system') return; // Hide system prompt
      const wrapper = document.createElement('div');
      wrapper.className = 'solvire-msg-wrapper ' + (msg.role === 'user' ? 'user' : 'ai');
      
      const bubble = document.createElement('div');
      bubble.className = 'solvire-msg';
      bubble.innerText = msg.content;
      
      wrapper.appendChild(bubble);
      messagesArea.appendChild(wrapper);
    });

    if (isTyping) {
      const typingWrapper = document.createElement('div');
      typingWrapper.className = 'solvire-msg-wrapper ai';
      typingWrapper.innerHTML = `
        <div class="solvire-msg">
          <div class="solvire-typing">
            <div class="solvire-dot"></div>
            <div class="solvire-dot"></div>
            <div class="solvire-dot"></div>
          </div>
        </div>
      `;
      messagesArea.appendChild(typingWrapper);
    }
    messagesArea.scrollTop = messagesArea.scrollHeight;
  }

  async function sendMessage() {
    const text = inputField.value.trim();
    if (!text || isTyping) return;

    messages.push({ role: 'user', content: text });
    inputField.value = '';
    isTyping = true;
    renderMessages();

    try {
      const response = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      
      const data = await response.json();
      isTyping = false;
      
      let aiResponse = "I'm sorry, I couldn't generate a response.";
      if (data.choices && data.choices.length > 0 && data.choices[0].message) {
        aiResponse = data.choices[0].message.content;
      } else if (data.reply) {
        aiResponse = data.reply;
      }
      
      messages.push({ role: 'assistant', content: aiResponse });
      renderMessages();
    } catch (error) {
      isTyping = false;
      messages.push({ role: 'assistant', content: "Network error. Please try again later." });
      renderMessages();
    }
  }

  fab.addEventListener('click', toggleChat);
  closeBtn.addEventListener('click', toggleChat);
  sendBtn.addEventListener('click', sendMessage);
  inputField.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  renderMessages();
})();
</script>
